<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8"/>
  <title>eKosova Smart Assist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #fff;
    }
    .header {
      background: linear-gradient(135deg, #1d61a1, #7cc5d7);
      padding: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .header .title { color: #fff; font-weight: 700; font-size: 15px; }
    .header .sub   { color: rgba(255,255,255,.75); font-size: 11px; }
    .body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .status {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 10px;
      background: #f0fdf4; border: 1.5px solid #bbf7d0;
      font-size: 12px; font-weight: 600; color: #15803d;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
    .info { font-size: 12px; color: #64748b; line-height: 1.5; }
    .link {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; background: #f8fafc; border: 1.5px solid #e2e8f0;
      border-radius: 10px; text-decoration: none; color: #1d61a1;
      font-size: 13px; font-weight: 600;
    }
    .link:hover { background: #eff6ff; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:24px">🤖</span>
    <div>
      <div class="title">Smart Assist</div>
      <div class="sub">eKosova · Aktiv</div>
    </div>
  </div>
  <div class="body">
    <div class="status">
      <div class="dot"></div>
      Shërbimi është aktiv në ekosova.rks-gov.net
    </div>
    <p class="info">
      Qytetarët shohin butonin <strong>💬</strong> në këndin e djathtë poshtë të faqes zyrtare.
    </p>
    <a class="link" href="http://localhost:5173/agent" target="_blank">
      🎧 Hap Panelin e Agjentit
    </a>
  </div>
</body>
</html>
